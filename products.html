}

}

function loadProducts() {
  try {
    var data = localStorage.getItem(PROD_KEY);
    if (data) { var arr = JSON.parse(data); if (arr.length > 0) return arr; }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
}

function saveProducts() {
  localStorage.setItem(PROD_KEY, JSON.stringify(products));
}

// ===== Build filter bar =====
var cats = [];
products.forEach(function(p) {
  if (cats.indexOf(p.cat) === -1) cats.push(p.cat);
});

var filterBar = document.getElementById('filterBar');
cats.forEach(function(c) {
  var btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.setAttribute('data-cat', c);
  btn.textContent = c;
  filterBar.appendChild(btn);
});

// ===== Render products =====
function renderProducts(cat) {
  var grid = document.getElementById('productGrid');
  var filtered = cat === 'all' ? products : products.filter(function(p) { return p.cat === cat; });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无该分类产品</p></div>';
    return;
  }

  var html = '';
  filtered.forEach(function(p) {
    var stockClass = p.stock === '有限' ? 'limited' : '';
    html += '<div class="product-card">' +
      '<div class="card-img">' +
        '<span class="emoji-prod">' + p.emoji + '</span>' +
        '<span class="tag-origin">' + p.origin + '</span>' +
        (p.hot ? '<span class="tag-hot">🔥 热销</span>' : '') +
        '<div class="card-actions' + (isAdmin ? ' show' : '') + '">' +
          '<button class="btn-edit" onclick="event.stopPropagation();openEditModal(' + p.id + ')" title="编辑">✎</button>' +
          '<button class="btn-del" onclick="event.stopPropagation();deleteProduct(' + p.id + ')" title="删除">✕</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<h3>' + p.name + '</h3>' +
        '<div class="specs">' + p.specs.map(function(s) { return '<span>' + s + '</span>'; }).join('') + '</div>' +
        '<div class="desc">' + p.desc + '</div>' +
        '<div class="card-footer">' +
          '<div class="price-range">' + p.price + '<em>起订量可议</em></div>' +
          '<div class="stock-tag ' + stockClass + '">' + (p.stock === '充足' ? '✅ ' : '⚠️ ') + p.stock + '</div>' +
        '</div>' +
        '<button class="btn-inquiry" onclick="event.stopPropagation();openInquiryModal(\'' + p.name + '\')">💬 询价 / 代理咨询</button>' +
      '</div>' +
    '</div>';
  });
  grid.innerHTML = html;
}

// ===== Update stats =====
function updateStats(cat) {
  var count = cat === 'all' ? products.length : products.filter(function(p) { return p.cat === cat; }).length;
  var origins = [];
  var originSet = {};
  var source = cat === 'all' ? products : products.filter(function(p) { return p.cat === cat; });
  source.forEach(function(p) {
    if (!originSet[p.origin]) { originSet[p.origin] = true; origins.push(p.origin); }
  });
  document.getElementById('statsBar').innerHTML =
    '<div class="stat-item"><div class="sv">' + count + '</div><div class="sl">在售商品</div></div>' +
    '<div class="stat-item"><div class="sv">' + origins.length + '</div><div class="sl">产地国</div></div>' +
    '<div class="stat-item"><div class="sv">' + cats.length + '</div><div class="sl">品类</div></div>';
}

// ===== Filter click =====
filterBar.addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-btn')) {
    var btns = filterBar.querySelectorAll('.filter-btn');
    btns.forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
    var cat = e.target.getAttribute('data-cat');
    renderProducts(cat);
    updateStats(cat);
  }
});

// ===== Admin Functions =====
function checkPassword() {
  var pw = prompt('请输入管理密码（默认：laozhuang2026）：');
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    sessionStorage.setItem(ADMIN_KEY, '1');
    updateAdminUI();
    refreshAll();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (pw !== null) {
    alert('密码错误');
  }
}

function logoutAdmin() {
  isAdmin = false;
  sessionStorage.removeItem(ADMIN_KEY);
  updateAdminUI();
  refreshAll();
}

function updateAdminUI() {
  var bar = document.getElementById('adminBar');
  var btn = document.querySelector('.nav-admin');
  if (isAdmin) {
    bar.classList.add('show');
    if (btn) {
      btn.textContent = '✅ 管理模式';
      btn.style.background = '#00b894';
      btn.style.color = '#fff';
    }
    document.querySelectorAll('.card-actions').forEach(function(el) { el.classList.add('show'); });
  } else {
    bar.classList.remove('show');
    if (btn) {
      btn.textContent = '🔒 管理';
      btn.style.background = '#1a3a5c';
      btn.style.color = '#fff';
    }
    document.querySelectorAll('.card-actions').forEach(function(el) { el.classList.remove('show'); });
  }
}

function refreshAll() {
  var activeBtn = document.querySelector('.filter-btn.active');
  var cat = activeBtn ? activeBtn.getAttribute('data-cat') : 'all';
  renderProducts(cat);
  updateStats(cat);
  updateAdminUI();
}

function deleteProduct(id) {
  if (!isAdmin) return;
  var p = products.find(function(x) { return x.id === id; });
  if (!p) return;
  if (!confirm('确定删除商品「' + p.name + '」？此操作不可恢复。')) return;
  products = products.filter(function(x) { return x.id !== id; });
  saveProducts();
  refreshAll();
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
  document.body.style.overflow = '';
  editingId = null;
}

function saveEditProduct() {
  var name = document.getElementById('epName').value.trim();
  var cat = document.getElementById('epCat').value;
  var origin = document.getElementById('epOrigin').value.trim();
  if (!name || !origin) { alert('请填写商品名称和产地'); return; }

  var specsRaw = document.getElementById('epSpecs').value.trim();
  var specs = specsRaw ? specsRaw.split(',').map(function(s){ return s.trim(); }).filter(function(s){ return s; }) : [];

  var data = {
    id: editingId || nextId,
    name: name,
    cat: cat,
    origin: origin,
    emoji: document.getElementById('epEmoji').value.trim() || '📦',
    specs: specs,
    hot: document.getElementById('epHot').checked,
    desc: document.getElementById('epDesc').value.trim(),
    price: document.getElementById('epPrice').value.trim() || '面议',
    stock: document.getElementById('epStock').value
  };

  if (editingId) {
    var idx = products.findIndex(function(x) { return x.id === editingId; });
    if (idx >= 0) products[idx] = data;
  } else {
    products.push(data);
    nextId++;
  }

  saveProducts();
  closeEditModal();
  refreshAll();
}

// Edit modal overlay click to close
document.getElementById('editModal').addEventListener('click', function(e) {

});

// Masthead double-click for admin
document.querySelector('.masthead').addEventListener('dblclick', function(e) {

// Ctrl+Shift+A for admin
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('editModal').classList.contains('show')) closeEditModal();
    else if (document.getElementById('inquiryModal').classList.contains('show')) closeInquiryModal();
  }
  if (e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a')) {
    e.preventDefault();
    if (!isAdmin) checkPassword();
  }
});

  var list = loadInquiries();

function submitInquiry(e) {
  e.preventDefault();
  var checkedProds = [];
  var cbs = document.querySelectorAll('#inquiryForm input[type="checkbox"]:checked');
  cbs.forEach(function(cb) { checkedProds.push(cb.value); });

  if (checkedProds.length === 0) {
    alert('请至少选择一个感兴趣的产品');
    return;
  }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  var inquiry = {
    time: new Date().toLocaleString('zh-CN'),
    products: checkedProds,
    name: document.getElementById('inqName').value.trim(),
    company: document.getElementById('inqCompany').value.trim(),
    phone: document.getElementById('inqPhone').value.trim(),
    intent: document.getElementById('inqIntent').value,
    message: document.getElementById('inqMsg').value.trim()
  };

  saveInquiry(inquiry);

  // Show success
  var mc = document.getElementById('modalContent');
  mc.innerHTML =
    '<button class="modal-close" onclick="closeInquiryModal()">✕</button>' +
    '<div class="success-msg">' +
      '<div class="s-icon">✅</div>' +
      '<h4>咨询已提交！</h4>' +
      '<p>感谢您的关注，我们的业务团队将在<strong>24小时内</strong>与您联系。</p>' +
      '<div class="contact-info">' +
        '<div class="ci-row"><span style="font-size:16px">📞</span> <strong>电话：</strong>（请联系以鲜国际业务部）</div>' +
        '<div class="ci-row"><span style="font-size:16px">📧</span> <strong>邮箱：</strong>info@efsupplychain.com</div>' +
        '<div class="ci-row"><span style="font-size:16px">📍</span> <strong>地址：</strong>广东省广州市</div>' +
      '</div>' +
      '<button class="btn-submit" style="margin-top:16px;background:#e0e4e8;color:#666" onclick="closeInquiryModal()">关闭</button>' +
    '</div>';
}
