<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老庄报告 — 以鲜国际</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",-apple-system,sans-serif;
  color:#1a1a2e;line-height:1.75;background:#f8f9fb;overflow-x:hidden
}

/* ===== Nav ===== */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(10,22,40,.92);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:0 32px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  transition:all .3s
}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#00d4aa,#00a8e8);
  display:flex;align-items:center;justify-content:center;font-size:18px
}
.nav-name{color:#fff;font-size:15px;font-weight:600;letter-spacing:1px}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{
  color:rgba(255,255,255,.65);font-size:13px;
  transition:color .25s;letter-spacing:.5px
}
.nav-links a:hover{color:#00d4aa}
.nav-halal{
  background:linear-gradient(135deg,#00d4aa,#00a8e8);
  color:#0a1628!important;padding:6px 14px;border-radius:20px;
  font-weight:700;font-size:13px;transition:all .3s
}
.nav-halal:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,212,170,.35);
  color:#0a1628!important
}

/* ===== Masthead ===== */
.masthead{
  margin-top:60px;padding:80px 24px 60px;
  background:linear-gradient(175deg,#0a1628 0%,#16284a 60%,#1a3a5c 100%);
  text-align:center;position:relative;overflow:hidden
}
.masthead::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 30% 20%,rgba(0,168,232,.08) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(0,212,170,.06) 0%,transparent 60%);
  pointer-events:none
}
.masthead-badge{
  display:inline-block;padding:4px 16px;border-radius:12px;
  background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.25);
  color:#00d4aa;font-size:11px;letter-spacing:3px;font-weight:600;
  margin-bottom:24px;position:relative;z-index:1
}
.masthead h1{
  font-size:clamp(32px,5vw,56px);font-weight:800;color:#fff;
  letter-spacing:2px;margin-bottom:12px;position:relative;z-index:1
}
.masthead h1 span{color:#00d4aa}
.masthead .subtitle{
  color:rgba(255,255,255,.55);font-size:15px;letter-spacing:1px;
  position:relative;z-index:1
}
.masthead .issue-meta{
  margin-top:32px;display:flex;justify-content:center;gap:32px;
  color:rgba(255,255,255,.4);font-size:12px;letter-spacing:1px;
  position:relative;z-index:1
}
.masthead .issue-meta span{color:rgba(255,255,255,.7);font-weight:600}

/* ===== Main ===== */
main{max-width:1020px;margin:0 auto;padding:0 24px 80px}

/* ===== Section ===== */
.section{margin-top:56px}
.section-header{
  display:flex;align-items:center;gap:14px;margin-bottom:28px;
  padding-bottom:12px;border-bottom:2px solid #e8ecf0
}
.section-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0
}
.section-header h2{
  font-size:20px;font-weight:700;letter-spacing:1px;white-space:nowrap
}
.section-header .count{font-size:12px;color:#999;font-weight:400;white-space:nowrap}
.section-divider{flex:1;height:1px;background:#e8ecf0;min-width:20px}

/* accent: news (red) */
.accent-news .section-icon{background:#fef0f0;color:#e74c3c}
.accent-news .section-header{border-bottom-color:#fde8e8}
.accent-news h2{color:#c0392b}
/* accent: events (orange/amber) */
.accent-events .section-icon{background:#fff7ed;color:#ea580c}
.accent-events .section-header{border-bottom-color:#ffedd5}
.accent-events h2{color:#c2410c}
/* accent: reports (blue) */
.accent-reports .section-icon{background:#eef5fc;color:#2980b9}
.accent-reports .section-header{border-bottom-color:#dceaf5}
.accent-reports h2{color:#2471a3}
/* accent: policies (purple) */
.accent-policies .section-icon{background:#f5f0ff;color:#7c3aed}
.accent-policies .section-header{border-bottom-color:#ede5fa}
.accent-policies h2{color:#6d28d9}

/* ===== Cards: News ===== */
.news-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.news-card{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  border:1px solid #eef0f3;transition:all .25s;
  display:flex;flex-direction:column
}
.news-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.08);border-color:#dde0e4}
.news-card .card-top{padding:18px 20px 0;display:flex;align-items:flex-start;gap:8px}
.news-card .tag-dot{width:8px;height:8px;border-radius:50%;background:#e74c3c;margin-top:7px;flex-shrink:0}
.news-card .card-title{font-size:15px;font-weight:700;line-height:1.5;color:#1a1a2e;flex:1}
.news-card .card-body{padding:10px 20px 14px;font-size:13px;color:#5a6070;line-height:1.7;flex:1}
.news-card .card-foot{padding:12px 20px;border-top:1px solid #f5f6f8;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#999}
.news-card .card-source{font-weight:600;color:#7a8290}
.news-card .card-date{color:#bbb}
.news-card .card-tags{display:flex;gap:6px;flex-wrap:wrap}
.news-card .card-tag{padding:2px 8px;border-radius:4px;background:#fef0f0;color:#c0392b;font-size:10px}

/* ===== Cards: Events (like news cards but orange) ===== */
.events-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.event-card{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  border:1px solid #eef0f3;border-left:4px solid #ea580c;
  transition:all .25s;display:flex;flex-direction:column
}
.event-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.08);border-color:#ffedd5}
.event-card .card-top{padding:18px 20px 0;display:flex;align-items:flex-start;gap:8px}
.event-card .event-dot{width:8px;height:8px;border-radius:50%;background:#ea580c;margin-top:7px;flex-shrink:0}
.event-card .card-title{font-size:15px;font-weight:700;line-height:1.5;color:#1a1a2e;flex:1}
.event-card .card-body{padding:10px 20px 14px;font-size:13px;color:#5a6070;line-height:1.7;flex:1}
.event-card .card-foot{padding:12px 20px;border-top:1px solid #f5f6f8;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#999}
.event-card .card-source{font-weight:600;color:#7a8290}
.event-card .card-date{color:#bbb}
.event-card .card-tags{display:flex;gap:6px;flex-wrap:wrap}
.event-card .card-tag{padding:2px 8px;border-radius:4px;background:#fff7ed;color:#c2410c;font-size:10px}

/* ===== Cards: Reports ===== */
.reports-list{display:flex;flex-direction:column;gap:16px}
.report-card{
  background:#fff;border-radius:14px;padding:22px 24px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  border:1px solid #eef0f3;border-left:4px solid #2980b9;
  transition:all .25s;display:flex;gap:20px;align-items:flex-start
}
.report-card:hover{transform:translateX(4px);box-shadow:0 8px 28px rgba(0,0,0,.08);border-color:#dceaf5}
.report-card .report-icon{width:44px;height:44px;border-radius:10px;background:#eef5fc;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.report-card .report-content{flex:1;min-width:0}
.report-card .report-type{font-size:10px;letter-spacing:2px;color:#2980b9;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.report-card .report-title{font-size:16px;font-weight:700;line-height:1.5;color:#1a1a2e;margin-bottom:6px}
.report-card .report-summary{font-size:13px;color:#5a6070;line-height:1.7;margin-bottom:10px}
.report-card .report-meta{display:flex;gap:16px;font-size:11px;color:#999;flex-wrap:wrap}
.report-card .report-meta span{display:flex;align-items:center;gap:4px}
.report-card .report-dl{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:8px;background:#eef5fc;color:#2980b9;font-size:12px;font-weight:600;transition:all .2s;flex-shrink:0;white-space:nowrap}
.report-card .report-dl:hover{background:#dceaf5;color:#1a6dad}

/* ===== Cards: Policies (wider, purple accent) ===== */
.policies-list{display:flex;flex-direction:column;gap:14px}
.policy-card{
  background:#fff;border-radius:14px;padding:20px 24px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  border:1px solid #eef0f3;border-left:4px solid #7c3aed;
  transition:all .25s;display:flex;gap:18px;align-items:flex-start
}
.policy-card:hover{transform:translateX(4px);box-shadow:0 8px 28px rgba(0,0,0,.08);border-color:#ede5fa}
.policy-card .policy-icon{width:40px;height:40px;border-radius:10px;background:#f5f0ff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.policy-card .policy-content{flex:1;min-width:0}
.policy-card .policy-title{font-size:16px;font-weight:700;line-height:1.5;color:#1a1a2e;margin-bottom:6px}
.policy-card .policy-summary{font-size:13px;color:#5a6070;line-height:1.7;margin-bottom:8px}
.policy-card .policy-meta{display:flex;gap:16px;font-size:11px;color:#999;flex-wrap:wrap;align-items:center}
.policy-card .policy-meta span{display:flex;align-items:center;gap:4px}
.policy-card .policy-link{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:8px;background:#f5f0ff;color:#7c3aed;font-size:12px;font-weight:600;transition:all .2s;flex-shrink:0;white-space:nowrap}
.policy-card .policy-link:hover{background:#ede5fa;color:#6d28d9}

/* ===== Admin Trigger — hidden lock ===== */
.admin-trigger{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  border:1px solid #e8ecf0;background:#fafbfc;
  font-size:13px;cursor:pointer;color:#c0c8d0;
  transition:all .25s;margin-left:8px;vertical-align:middle;opacity:.5
}
.admin-trigger:hover{opacity:1;color:#7a8290;border-color:#c0c8d0}

/* ===== Password Gate ===== */
.pw-gate-overlay{
  position:fixed;inset:0;z-index:2100;display:none;
  align-items:center;justify-content:center;
  background:rgba(10,22,40,.4);backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px)
}
.pw-gate-overlay.active{display:flex}
.pw-gate{
  background:#fff;border-radius:12px;padding:28px 32px;width:320px;
  box-shadow:0 16px 48px rgba(0,0,0,.15);text-align:center
}
.pw-gate h4{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:6px}
.pw-gate .pw-hint{font-size:11px;color:#aaa;margin-bottom:18px}
.pw-gate input{
  width:100%;padding:10px 14px;border:1px solid #dde0e4;border-radius:8px;
  font-size:14px;text-align:center;letter-spacing:4px;font-family:monospace;
  transition:border-color .2s
}
.pw-gate input:focus{outline:none;border-color:#00a8e8}
.pw-gate .pw-error{font-size:11px;color:#e74c3c;margin-top:8px;min-height:18px}
.pw-gate .pw-btns{margin-top:16px;display:flex;gap:8px;justify-content:center}
.pw-gate .pw-btns button{
  padding:8px 20px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer
}
.pw-gate .btn-cancel{background:#f5f6f8;color:#7a8290}
.pw-gate .btn-cancel:hover{background:#e8ecf0}
.pw-gate .btn-confirm{background:linear-gradient(135deg,#00d4aa,#00a8e8);color:#0a1628}
.pw-gate .btn-confirm:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,168,232,.25)}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(10,22,40,.55);
  z-index:2000;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)
}
.modal-overlay.active{display:flex}
.modal{
  background:#fff;border-radius:16px;width:90%;max-width:540px;max-height:85vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)
}
.modal-head{padding:20px 24px;border-bottom:1px solid #eef0f3;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#f5f6f8;cursor:pointer;font-size:16px;color:#7a8290;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e8ecf0}
.modal-body{padding:24px}
.modal-body .field{margin-bottom:16px}
.modal-body label{display:block;font-size:12px;font-weight:600;color:#5a6070;margin-bottom:6px;letter-spacing:.5px}
.modal-body label .req{color:#e74c3c}
.modal-body select,.modal-body input[type=text],.modal-body input[type=date],.modal-body input[type=url],.modal-body textarea{
  width:100%;padding:10px 14px;border:1px solid #dde0e4;border-radius:8px;
  font-size:13px;font-family:inherit;color:#1a1a2e;transition:border-color .2s;background:#fafbfc
}
.modal-body select:focus,.modal-body input:focus,.modal-body textarea:focus{outline:none;border-color:#00a8e8;background:#fff}
.modal-body textarea{resize:vertical;min-height:80px}
.modal-foot{padding:16px 24px;border-top:1px solid #eef0f3;display:flex;justify-content:flex-end;gap:10px}
.modal-foot button{padding:10px 24px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.modal-foot .btn-cancel{background:#f5f6f8;color:#7a8290}
.modal-foot .btn-cancel:hover{background:#e8ecf0}
.modal-foot .btn-submit{background:linear-gradient(135deg,#00d4aa,#00a8e8);color:#0a1628}
.modal-foot .btn-submit:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,168,232,.3)}

/* ===== Empty State ===== */
.empty-state{text-align:center;padding:40px 20px;color:#bbb}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:13px}

/* ===== Footer ===== */
footer{text-align:center;padding:40px 24px;color:#bbb;font-size:12px;border-top:1px solid #eef0f3}

/* ===== Responsive ===== */
@media(max-width:768px){
  .nav{padding:0 20px}
  .nav-links{display:none}
  .masthead{padding:60px 20px 48px}
  .masthead h1{font-size:28px}
  .masthead .issue-meta{gap:20px;flex-wrap:wrap}
  main{padding:0 16px 60px}
  .news-grid,.events-grid{grid-template-columns:1fr}
  .report-card,.policy-card{flex-direction:column;gap:12px}
}
@media(max-width:480px){
  .section-header h2{font-size:17px}
}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1a1a2e;color:#fff;padding:10px 24px;border-radius:24px;
  font-size:13px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none
}
.toast.show{opacity:1}
</style>
</head>

    <div class="section-divider"></div>
  </div>
  <div class="policies-list" id="policiesList"></div>
</div>

</main>

<footer>&copy; 2026 以鲜国际 EverFresh Supply Chain. 老庄报告 · 行业洞察汇编 <span class="admin-trigger" onclick="openPwGate()" title="内容管理">🔒</span></footer>

<!-- ═══ Password Gate ═══ -->
<div class="pw-gate-overlay" id="pwGateOverlay" onclick="closePwGateOutside(event)">
  <div class="pw-gate" onclick="event.stopPropagation()">
    <h4>🔐 内容管理</h4>
    <p class="pw-hint">输入管理密码以新增内容</p>

    </div>
  </div>
</div>

<!-- ═══ Modal ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="modalTitle">新增内容</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" onclick="submitForm()">保存</button>
    </div>
  </div>
</div>

<!-- ═══ Toast ═══ -->
<div class="toast" id="toast"></div>

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
var currentType = 'news';
var KEYS = ['news','events','reports','policies'];
var KEY = 'laozhuang_reports_user';

function loadAllData() {
  var merged = {};
  KEYS.forEach(function(k) { merged[k] = []; });

  // Load demo data
  KEYS.forEach(function(k) {
    if (DEMO_DATA[k]) merged[k] = merged[k].concat(DEMO_DATA[k]);
  });

  // Load user data from localStorage
  try {
    var stored = JSON.parse(localStorage.getItem(KEY) || '[]');
    (stored || []).forEach(function(item) {
      var t = item.type;
      if (t === 'event') t = 'events';
      if (t === 'policy') t = 'policies';
      if (merged[t]) merged[t].push(item);
    });
  } catch(e) {}

  // Sort by date desc
  KEYS.forEach(function(k) {
    merged[k].sort(function(a,b) { return b.date.localeCompare(a.date); });
  });
  return merged;
}

function countTotal(data) {
  var total = 0;
  KEYS.forEach(function(k) { total += data[k].length; });
  return total;
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function renderAll() {
  var data = loadAllData();
  renderNews(data.news);
  renderEvents(data.events);
  renderReports(data.reports);
  renderPolicies(data.policies);
  document.getElementById('totalCount').textContent = '共收录 ' + countTotal(data) + ' 条内容';
}

function renderNews(items) {
  var grid = document.getElementById('newsGrid');
  document.getElementById('newsCount').textContent = items.length + ' 条';
  if (!items.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无热点新闻</p></div>'; return; }
  grid.innerHTML = items.map(function(n) {
    var tagsHtml = (n.tags || []).map(function(t) { return '<span class="card-tag">' + esc(t) + '</span>'; }).join('');
    return '<div class="news-card">' +
      '<div class="card-top"><div class="tag-dot"></div><div class="card-title">' + esc(n.title) + '</div></div>' +
      '<div class="card-body">' + esc(n.summary || '') + '</div>' +
      '<div class="card-foot">' +
        '<div><span class="card-source">' + esc(n.source || '') + '</span> · <span class="card-date">' + esc(n.date) + '</span></div>' +
        (tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : '') +
      '</div></div>';
  }).join('');
}

function renderEvents(items) {
  var grid = document.getElementById('eventsGrid');
  document.getElementById('eventsCount').textContent = items.length + ' 条';
  if (!items.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无焦点事件</p></div>'; return; }
  grid.innerHTML = items.map(function(n) {
    var tagsHtml = (n.tags || []).map(function(t) { return '<span class="event-card-tag" style="padding:2px 8px;border-radius:4px;background:#fff7ed;color:#c2410c;font-size:10px">' + esc(t) + '</span>'; }).join('');
    return '<div class="event-card">' +
      '<div class="card-top"><div class="event-dot"></div><div class="card-title">' + esc(n.title) + '</div></div>' +
      '<div class="card-body">' + esc(n.summary || '') + '</div>' +
      '<div class="card-foot">' +
        '<div><span class="card-source">' + esc(n.source || '') + '</span> · <span class="card-date">' + esc(n.date) + '</span></div>' +
        (tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : '') +
      '</div></div>';
  }).join('');
}

function renderReports(items) {
  var list = document.getElementById('reportsList');
  document.getElementById('reportsCount').textContent = items.length + ' 份';
  if (!items.length) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><p>暂无行业报告</p></div>'; return; }
  list.innerHTML = items.map(function(r) {
    return '<div class="report-card">' +
      '<div class="report-icon">📄</div><div class="report-content">' +
        '<div class="report-type">' + esc(r.type || '行业报告') + '</div>' +
        '<div class="report-title">' + esc(r.title) + '</div>' +
        '<div class="report-summary">' + esc(r.summary || '') + '</div>' +
        '<div class="report-meta"><span>🏢 ' + esc(r.source || '') + '</span><span>📅 ' + esc(r.date) + '</span></div>' +
      '</div>' +
      (r.url && r.url !== '#' ? '<a href="' + esc(r.url) + '" target="_blank" class="report-dl">📥 查看</a>' : '<span class="report-dl" style="opacity:.5">📥 待上传</span>') +

  }).join('');
}

function renderPolicies(items) {

        '<div class="policy-meta"><span>🏛 ' + esc(r.source || '') + '</span><span>📅 ' + esc(r.date) + '</span></div>' +
      '</div>' +

    '</div>';
  }).join('');

var AUTH_KEY = 'laozhuang_reports_auth';
// 默认密码 "laozhuang2026"，base64 存储仅作简单混淆
var PW_HASH = 'bGFvemh1YW5nMjAyNg==';

function isAuth() { return sessionStorage.getItem(AUTH_KEY) === '1'; }

function openPwGate() {
  if (isAuth()) { openModal(); return; }
  document.getElementById('pwGateOverlay').classList.add('active');
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
  setTimeout(function(){ document.getElementById('pwInput').focus(); }, 100);
}

function closePwGate() {
  document.getElementById('pwGateOverlay').classList.remove('active');
}

function closePwGateOutside(e) {
  if (e.target === document.getElementById('pwGateOverlay')) closePwGate();
}

function checkPw() {
  var input = document.getElementById('pwInput').value;
  try {
    var encoded = btoa(input);
    if (encoded === PW_HASH) {
      sessionStorage.setItem(AUTH_KEY, '1');
      closePwGate();
      openModal();
    } else {
      document.getElementById('pwError').textContent = '密码错误，请重试';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  } catch(e) {
    document.getElementById('pwError').textContent = '密码错误，请重试';
  }
}

function openModal(type) {
  currentType = type || 'news';
  document.getElementById('modalOverlay').classList.add('active');
  renderModalForm(currentType);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

var TITLE_MAP = { news: '新增热点新闻', event: '新增焦点事件', report: '新增行业报告', policy: '新增政策法规' };

  document.getElementById('modalTitle').textContent = TITLE_MAP[type] || '新增内容';
  var body = document.getElementById('modalBody');
  var html = '<div class="field"><label>类型 <span class="req">*</span></label>' +
    '<select id="formType" onchange="switchFormType(this.value)">' +
      '<option value="news"' + (type==='news'?' selected':'') + '>🔥 热点新闻</option>' +
      '<option value="event"' + (type==='event'?' selected':'') + '>📰 焦点事件</option>' +
      '<option value="report"' + (type==='report'?' selected':'') + '>📊 行业报告</option>' +
      '<option value="policy"' + (type==='policy'?' selected':'') + '>⚖️ 政策法规</option>' +
    '</select></div>';

  if (type === 'news' || type === 'event') {
    html += '<div class="field"><label>标题 <span class="req">*</span></label><input type="text" id="fTitle" placeholder="标题"></div>';
    html += '<div class="field"><label>来源 <span class="req">*</span></label><input type="text" id="fSource" placeholder="如：海关总署"></div>';
    html += '<div class="field"><label>日期</label><input type="date" id="fDate"></div>';
    html += '<div class="field"><label>摘要</label><textarea id="fSummary" placeholder="简要描述（1-3句话）"></textarea></div>';
    html += '<div class="field"><label>原文链接</label><input type="url" id="fUrl" placeholder="https://..."></div>';
    html += '<div class="field"><label>标签（逗号分隔）</label><input type="text" id="fTags" placeholder="如：进口数据, 牛肉"></div>';
  } else if (type === 'report') {
    html += '<div class="field"><label>类型</label><select id="fReportType"><option value="行业研报">行业研报</option><option value="白皮书">白皮书</option><option value="政策文件">政策文件</option><option value="市场分析">市场分析</option></select></div>';
    html += '<div class="field"><label>标题 <span class="req">*</span></label><input type="text" id="fTitle" placeholder="报告标题"></div>';
    html += '<div class="field"><label>来源/机构 <span class="req">*</span></label><input type="text" id="fSource" placeholder="如：中国肉类协会"></div>';
    html += '<div class="field"><label>发布日期</label><input type="date" id="fDate"></div>';
    html += '<div class="field"><label>摘要</label><textarea id="fSummary" placeholder="报告核心结论（1-3句话）"></textarea></div>';
    html += '<div class="field"><label>报告链接</label><input type="url" id="fUrl" placeholder="https://..."></div>';
  } else if (type === 'policy') {
    html += '<div class="field"><label>标题 <span class="req">*</span></label><input type="text" id="fTitle" placeholder="政策/法规名称"></div>';
    html += '<div class="field"><label>发布机构 <span class="req">*</span></label><input type="text" id="fSource" placeholder="如：海关总署、商务部"></div>';
    html += '<div class="field"><label>发布日期</label><input type="date" id="fDate"></div>';
    html += '<div class="field"><label>摘要</label><textarea id="fSummary" placeholder="政策要点（1-3句话）"></textarea></div>';
    html += '<div class="field"><label>原文链接</label><input type="url" id="fUrl" placeholder="https://..."></div>';
  }

  body.innerHTML = html;
}

function switchFormType(val) { currentType = val; renderModalForm(val); }

function submitForm() {
  var type = document.getElementById('formType').value;
  if (['news','event','report','policy'].indexOf(type) >= 0) currentType = type;

  var item = { type: currentType, id: 'u' + Date.now() };

  item.title = (document.getElementById('fTitle')||{}).value || '';
  item.source = (document.getElementById('fSource')||{}).value || '';
  item.date = (document.getElementById('fDate')||{}).value || new Date().toISOString().slice(0,10);
  item.summary = (document.getElementById('fSummary')||{}).value || '';
  item.url = (document.getElementById('fUrl')||{}).value || '';

  if (currentType === 'news' || currentType === 'event') {
    var tagsStr = (document.getElementById('fTags')||{}).value || '';
    item.tags = tagsStr.split(',').map(function(s){return s.trim();}).filter(Boolean);
    if (!item.title || !item.source) { showToast('请填写标题和来源'); return; }
  } else if (currentType === 'report') {
    item.type = (document.getElementById('fReportType')||{}).value || '行业报告';
    if (!item.title || !item.source) { showToast('请填写标题和来源'); return; }
  } else if (currentType === 'policy') {
    if (!item.title || !item.source) { showToast('请填写标题和发布机构'); return; }
  }

  var stored;
  try { stored = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { stored = []; }
  stored.push(item);
  localStorage.setItem(KEY, JSON.stringify(stored));

  closeModal();
  renderAll();
  showToast('✅ 已保存！我会定期将你的新增内容合并到正式版中。');

  var sectionMap = { news: 'news-section', event: 'events-section', report: 'reports-section', policy: 'policies-section' };
  var el = document.getElementById(sectionMap[currentType]);
  if (el) setTimeout(function() { el.scrollIntoView({behavior:'smooth',block:'start'}); }, 200);
}

// ═══════════════════════════════════════
//  UTIL
// ═══════════════════════════════════════
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  renderAll();
  document.getElementById('fDate') && (document.getElementById('fDate').value = new Date().toISOString().slice(0,10));
});
</script>
