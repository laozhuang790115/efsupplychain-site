*, *::before, *::after { margin:0; padding:0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;

}
a { text-decoration: none; color: inherit; }

/* Nav */
nav {
  background: rgba(255,255,255,0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);

}
.nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 52px; }
.nav-logo { font-size: 18px; font-weight: 800; color: #00a8e8; margin-right: 32px; }
.nav-links { display: flex; gap: 20px; align-items: center; }
.nav-links a { font-size: 13px; font-weight: 500; color: #555; transition: color 0.2s; }
.nav-links a:hover { color: #00a8e8; }
.nav-tools { background: #f59e0b; color: #fff !important; padding: 5px 14px; border-radius: 20px; font-size: 12px; }
.nav-tools:hover { background: #e08f0b; color: #fff !important; }

/* Admin bar */
.admin-bar {
  display: none; background: #1a3a5c; color: #fff; padding: 8px 24px;
  font-size: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.admin-bar.show { display: flex !important; }
.admin-bar .admin-lock { cursor: pointer; padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: none; color: #fff; font-size: 11px; font-family: inherit; }
.admin-bar .admin-hint { opacity: 0.7; font-size: 11px; }

/* Masthead */
.masthead {
  background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #00a8e8 100%);
  color: #fff; text-align: center; padding: 40px 24px 36px; cursor: default;
  position: relative;
}
.masthead h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
.masthead p { font-size: 14px; opacity: 0.85; max-width: 600px; margin: 0 auto; }
.masthead .admin-hint {
  position: absolute; bottom: 14px; right: 24px; font-size: 13px; font-weight: 600;
  color: #fff; cursor: pointer;
  background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.5); border-radius: 8px;
  padding: 6px 16px; transition: all 0.2s;
  display: inline-block;
}
.masthead .admin-hint:hover { background: rgba(255,255,255,0.3); border-color: #fff; transform: scale(1.05); }

/* Main layout */
.main-wrap {
  max-width: 1300px; margin: 0 auto; padding: 24px; display: flex; gap: 24px; min-height: 600px;
}

/* Map */
.map-section { flex: 1.2; min-width: 0; }
.map-section h2 { font-size: 16px; font-weight: 700; color: #1a3a5c; margin-bottom: 12px; }
.map-svg {
  width: 100%; height: auto; background: #e8f4fd; border-radius: 16px;
  border: 1.5px solid #cce9fb;
}
.map-bg { fill: #d4ecfc; stroke: #8ecae6; stroke-width: 1.2; }
.map-bg-tw { fill: #e8f4fd; stroke: #8ecae6; stroke-width: 1; }
.city-dot { cursor: pointer; }
.city-dot circle { transition: all 0.2s; }
.city-dot text { font-size: 10px; fill: #1a3a5c; pointer-events: none; font-weight: 600; }
.city-dot:hover circle { r: 10; fill: #f59e0b; }

/* Side panel */
.side-panel {
  width: 380px; min-width: 320px; background: #fff; border-radius: 16px;
  border: 1.5px solid #e8edf2; display: flex; flex-direction: column;
  max-height: 680px; overflow: hidden;
}
.panel-header {
  padding: 16px 18px; border-bottom: 1px solid #e8edf2;
  display: flex; align-items: center; justify-content: space-between;
}
.panel-header .city-left { display: flex; align-items: center; gap: 12px; }
.panel-header .city-icon { font-size: 28px; }
.panel-header h3 { font-size: 18px; font-weight: 700; color: #1a3a5c; }
.panel-header .count { font-size: 12px; color: #888; }
.panel-header .add-btn {
  display: none; background: #00a8e8; color: #fff; border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 11px; cursor: pointer; font-family: inherit; font-weight: 600;
}
.panel-header .add-btn.show { display: inline-block !important; }
.warehouse-list {
  flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.wh-card {
  background: #f8fafc; border: 1.5px solid #e8edf2; border-radius: 12px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s; position: relative;
}
.wh-card:hover { border-color: #00a8e8; background: #f0f9ff; }
.wh-card .wh-name { font-size: 14px; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; }
.wh-card .wh-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: #888; }
.wh-card .wh-meta span { display: flex; align-items: center; gap: 4px; }
.wh-card .wh-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.wh-card .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
.wh-card .tag.blue { background: #e3f2fd; color: #1565c0; }
.wh-card .edit-btn {
  display: none; position: absolute; top: 10px; right: 10px;
  background: #e8edf2; border: none; border-radius: 6px; padding: 3px 8px;
  font-size: 11px; cursor: pointer; color: #555; font-family: inherit; z-index: 10;
}
.wh-card .edit-btn.show { display: block !important; }
.wh-card .edit-btn:hover { background: #00a8e8; color: #fff; }

/* Detail modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {

  max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.modal-body { padding: 28px; }
.modal-close {
  float: right; background: none; border: none; font-size: 22px;
  cursor: pointer; color: #aaa; padding: 4px; line-height: 1;
}
.modal-close:hover { color: #333; }
.modal-header { margin-bottom: 20px; }
.modal-header h2 { font-size: 20px; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; }
.modal-header .city-badge {

  background: #e3f2fd; color: #1565c0; font-weight: 600;
}
.modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.modal-info-item { background: #f8fafc; border-radius: 10px; padding: 12px; }
.modal-info-item .label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-info-item .value { font-size: 14px; font-weight: 600; color: #1a3a5c; margin-top: 2px; }
.modal-desc { font-size: 13px; color: #555; line-height: 1.8; }
.modal-features { margin-top: 16px; }
.modal-features h4 { font-size: 13px; font-weight: 700; color: #1a3a5c; margin-bottom: 8px; }
.modal-features ul { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; }
.modal-features li { font-size: 11px; padding: 4px 10px; border-radius: 8px; background: #e8f5e9; color: #2e7d32; }
.modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid #e8edf2; padding-top: 16px; }
.modal-actions button {

  font-family: inherit; cursor: pointer; font-weight: 600;

.btn-edit-wh { background: #e3f2fd; color: #1565c0; }
.btn-edit-wh:hover { background: #bbdefb; }
.btn-del-wh { background: #fde8e8; color: #c62828; }

.edit-body .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.edit-body .form-full { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.edit-body label { font-size: 12px; color: #888; font-weight: 600; }
.edit-body input, .edit-body textarea, .edit-body select {

.edit-body .edit-actions button {

.btn-save { background: #00a8e8; color: #fff; }
.btn-save:hover { background: #0284c7; }
.btn-cancel { background: #e8edf2; color: #555; }

/* Footer */
footer { text-align: center; padding: 24px; font-size: 12px; color: #aaa; border-top: 1px solid #e8edf2; margin-top: 40px; }

/* Empty state */
.empty-panel { display: flex; align-items: center; justify-content: center; flex: 1; color: #ccc; font-size: 14px; }

// ====== Merge custom data ======
function getMergedStores() {
  var merged = {};
  var raw = localStorage.getItem('COLDCHAIN_CUSTOM');
  var custom = raw ? JSON.parse(raw) : {};
  for (var key in COLDCHAIN_DATA) {
    var def = COLDCHAIN_DATA[key];
    var cityCustom = custom[key];
    merged[key] = {
      name: cityCustom && cityCustom.name ? cityCustom.name : def.name,
      icon: cityCustom && cityCustom.icon ? cityCustom.icon : def.icon,
      desc: cityCustom && cityCustom.desc ? cityCustom.desc : def.desc,
      stores: (cityCustom && cityCustom.stores) ? cityCustom.stores.slice() : def.stores.slice()
    };
  }
  return merged;
}
function saveMergedStores(merged) {
  var toSave = {};
  for (var key in merged) {
    toSave[key] = { stores: merged[key].stores };
  }
  localStorage.setItem('COLDCHAIN_CUSTOM', JSON.stringify(toSave));
}

  var bar = document.getElementById('admin-bar');
  if (isAdmin) {
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
  // Edit buttons on wh-cards
  var editBtns = document.querySelectorAll('.wh-card .edit-btn');
  for (var i = 0; i < editBtns.length; i++) {
    if (isAdmin) {
      editBtns[i].classList.add('show');
    } else {
      editBtns[i].classList.remove('show');
    }
  }
  // Add button in panel header
  var addBtn = document.querySelector('.panel-header .add-btn');
  if (addBtn) {
    if (isAdmin) {
      addBtn.classList.add('show');
    } else {
      addBtn.classList.remove('show');
    }
  }
  // Modal action buttons
  var modalEdit = document.getElementById('modal-edit-btn');
  var modalDel = document.getElementById('modal-del-btn');
  if (modalEdit) modalEdit.style.display = isAdmin ? 'inline-block' : 'none';
  if (modalDel) modalDel.style.display = isAdmin ? 'inline-block' : 'none';
}

function enterAdmin() {
  isAdmin = true;
  updateAdminUI();
  if (currentCityKey) renderCityPanel(currentCityKey);
  alert('✅ 管理模式已开启（密码：laozhuang2026）\n\n现在可以：\n• 点击冷库卡片右上角「✏️ 编辑」\n• 点击面板顶部「+ 新增冷库」');
}

function checkPassword() {
  var pw = prompt('请输入管理密码（默认：laozhuang2026）：');
  if (pw === ADMIN_PASSWORD) {
    enterAdmin();
  } else if (pw !== null) {
    alert('❌ 密码错误');
  }
}

function logoutAdmin() {
  isAdmin = false;
  updateAdminUI();
  if (currentCityKey) renderCityPanel(currentCityKey);
  alert('已退出管理模式');
}

// ====== Select City ======
function selectCity(cityKey) {
  currentCityKey = cityKey;
  var stores = getMergedStores();
  var city = stores[cityKey];
  if (!city) return;
  renderCityPanel(cityKey);

  // Highlight on map
  var dots = document.querySelectorAll('.city-dot');
  for (var j = 0; j < dots.length; j++) {
    var isSel = dots[j].getAttribute('data-city') === cityKey;
    var circ = dots[j].querySelector('circle');
    circ.setAttribute('fill', isSel ? '#f59e0b' : '#00a8e8');
    if (isSel) {
      circ.setAttribute('r', '10');
    } else {
      var pos = CITY_POSITIONS[dots[j].getAttribute('data-city')];
      if (pos) circ.setAttribute('r', pos.r);
    }
  }
}

function renderCityPanel(cityKey) {
  var stores = getMergedStores();
  var city = stores[cityKey];
  if (!city) return;

  var header = document.getElementById('panel-header');
  header.innerHTML = '<div class="city-left">' +
    '<div class="city-icon">' + city.icon + '</div>' +
    '<div><h3>' + city.name + '</h3><div class="count">' + city.desc + ' · ' + city.stores.length + ' 座冷库</div></div>' +
    '</div>' +
    '<button class="add-btn' + (isAdmin ? ' show' : '') + '" onclick="openAddModal(\'' + cityKey + '\')">+ 新增冷库</button>';

  var list = document.getElementById('warehouse-list');
  list.innerHTML = '';
  for (var i = 0; i < city.stores.length; i++) {
    var s = city.stores[i];
    var card = document.createElement('div');
    card.className = 'wh-card';
    card.setAttribute('onclick', 'showDetail(\'' + cityKey + '\',' + i + ')');
    card.innerHTML =
      '<button class="edit-btn' + (isAdmin ? ' show' : '') + '" onclick="event.stopPropagation();openEditModal(\'' + cityKey + '\',' + i + ')">✏️ 编辑</button>' +
      '<div class="wh-name">' + s.name + '</div>' +
      '<div class="wh-meta"><span>📍 ' + s.zone + '</span><span>📦 ' + s.capacity + '</span><span>🌡️ ' + s.temp + '</span></div>' +
      '<div class="wh-tags">' + s.tags.map(function(t){return '<span class="tag' + (t==='海关监管'||t==='保税仓'?' blue':'') + '">' + t + '</span>';}).join('') + '</div>';
    list.appendChild(card);
  }

  document.getElementById('empty-panel').style.display = 'none';
  document.getElementById('panel-content').style.display = 'flex';
}

// ====== Detail Modal ======
function showDetail(cityKey, idx) {
  var stores = getMergedStores();
  var city = stores[cityKey];
  if (!city || !city.stores[idx]) return;
  var s = city.stores[idx];
  currentDetailIdx = idx;
  currentDetailCity = cityKey;

  document.getElementById('modal-title').textContent = s.name;
  document.getElementById('modal-city-badge').textContent = city.name + ' · ' + s.zone;

  document.getElementById('modal-info').innerHTML =
    '<div class="modal-info-item"><div class="label">库容</div><div class="value">' + s.capacity + '</div></div>' +
    '<div class="modal-info-item"><div class="label">温区</div><div class="value">' + s.temp + '</div></div>' +
    '<div class="modal-info-item"><div class="label">资质认证</div><div class="value">' + s.cert + '</div></div>' +
    '<div class="modal-info-item"><div class="label">所在区域</div><div class="value">' + s.zone + '</div></div>';

  document.getElementById('modal-desc').textContent = s.desc;

  document.getElementById('modal-features').innerHTML =
    '<h4>✅ 核心能力</h4>' +
    '<ul>' + s.features.map(function(f){return '<li>' + f + '</li>';}).join('') + '</ul>';

  // Show edit/del buttons if admin
  document.getElementById('modal-edit-btn').style.display = isAdmin ? 'inline-block' : 'none';
  document.getElementById('modal-del-btn').style.display = isAdmin ? 'inline-block' : 'none';

  document.getElementById('detail-modal').classList.add('show');
}
function closeDetail() {
  document.getElementById('detail-modal').classList.remove('show');
  currentDetailIdx = null;
  currentDetailCity = null;
}
function editFromDetail() {
  if (currentDetailCity !== null && currentDetailIdx !== null) {
    openEditModal(currentDetailCity, currentDetailIdx);
  }
}
function deleteFromDetail() {
  if (currentDetailCity !== null && currentDetailIdx !== null) {
    deleteWarehouse(currentDetailCity, currentDetailIdx);
  }
}

// ====== Edit / Add ======
function openAddModal(cityKey) {
  if (!isAdmin) { checkPassword(); return; }
  currentDetailCity = cityKey;
  currentDetailIdx = null;
  var body = document.getElementById('edit-body');
  body.innerHTML =
    '<h3>➕ 新增冷库 — ' + getMergedStores()[cityKey].name + '</h3>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>冷库名称 *</label><input id="edit-name" placeholder="例：XX冷链物流中心"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>所在区域 *</label><input id="edit-zone" placeholder="例：XX保税区"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>库容 *</label><input id="edit-capacity" placeholder="例：15万吨"></div>' +
      '<div class="form-full"><label>温区 *</label><input id="edit-temp" placeholder="例：-25℃ ~ 15℃"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>资质认证</label><input id="edit-cert" placeholder="例：海关监管·ISO9001"></div>' +
    '</div>' +
    '<div class="form-full"><label>标签（逗号分隔）</label><input id="edit-tags" placeholder="例：海关监管,保税仓"></div>' +
    '<div class="form-full"><label>简介</label><textarea id="edit-desc" placeholder="冷库简介..."></textarea></div>' +
    '<div class="form-full"><label>核心能力（逗号分隔）</label><input id="edit-features" placeholder="例：临港区位,海关监管,多温区"></div>' +
    '<div class="edit-actions">' +
      '<button class="btn-cancel" onclick="closeEdit()">取消</button>' +
      '<button class="btn-save" onclick="saveNewWh(\'' + cityKey + '\')">💾 保存</button>' +
    '</div>';
  document.getElementById('edit-modal').classList.add('show');
}
function openEditModal(cityKey, idx) {
  if (!isAdmin) { checkPassword(); return; }
  currentDetailCity = cityKey;
  currentDetailIdx = idx;
  var stores = getMergedStores();
  var s = stores[cityKey].stores[idx];
  var body = document.getElementById('edit-body');
  body.innerHTML =
    '<h3>✏️ 编辑冷库 — ' + s.name + '</h3>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>冷库名称 *</label><input id="edit-name" value="' + escAttr(s.name) + '"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>所在区域 *</label><input id="edit-zone" value="' + escAttr(s.zone) + '"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>库容 *</label><input id="edit-capacity" value="' + escAttr(s.capacity) + '"></div>' +
      '<div class="form-full"><label>温区 *</label><input id="edit-temp" value="' + escAttr(s.temp) + '"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>资质认证</label><input id="edit-cert" value="' + escAttr(s.cert) + '"></div>' +
    '</div>' +
    '<div class="form-full"><label>标签（逗号分隔）</label><input id="edit-tags" value="' + s.tags.join(',') + '"></div>' +
    '<div class="form-full"><label>简介</label><textarea id="edit-desc">' + escHtml(s.desc) + '</textarea></div>' +
    '<div class="form-full"><label>核心能力（逗号分隔）</label><input id="edit-features" value="' + s.features.join(',') + '"></div>' +
    '<div class="edit-actions">' +
      '<button class="btn-cancel" onclick="closeEdit()">取消</button>' +
      '<button class="btn-save" onclick="saveEditWh(\'' + cityKey + '\',' + idx + ')">💾 保存</button>' +
    '</div>';
  document.getElementById('edit-modal').classList.add('show');
}
function closeEdit() {
  document.getElementById('edit-modal').classList.remove('show');
}
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function saveNewWh(cityKey) {
  var name = document.getElementById('edit-name').value.trim();
  if (!name) { alert('请输入冷库名称'); return; }
  var zone = document.getElementById('edit-zone').value.trim() || '未注明';
  var capacity = document.getElementById('edit-capacity').value.trim() || '未注明';
  var temp = document.getElementById('edit-temp').value.trim() || '未注明';
  var cert = document.getElementById('edit-cert').value.trim();
  var tags = document.getElementById('edit-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
  var desc = document.getElementById('edit-desc').value.trim();
  var features = document.getElementById('edit-features').value.split(',').map(function(t){return t.trim();}).filter(Boolean);

  var merged = getMergedStores();
  merged[cityKey].stores.push({
    name: name, zone: zone, capacity: capacity, temp: temp, cert: cert,
    tags: tags.length ? tags : ['第三方物流'], desc: desc, features: features.length ? features : ['冷链存储']
  });
  saveMergedStores(merged);

  closeEdit();
  renderCityPanel(cityKey);
  alert('✅ 冷库已添加！');
}
function saveEditWh(cityKey, idx) {
  var name = document.getElementById('edit-name').value.trim();
  if (!name) { alert('请输入冷库名称'); return; }
  var zone = document.getElementById('edit-zone').value.trim() || '未注明';
  var capacity = document.getElementById('edit-capacity').value.trim() || '未注明';
  var temp = document.getElementById('edit-temp').value.trim() || '未注明';
  var cert = document.getElementById('edit-cert').value.trim();
  var tags = document.getElementById('edit-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
  var desc = document.getElementById('edit-desc').value.trim();
  var features = document.getElementById('edit-features').value.split(',').map(function(t){return t.trim();}).filter(Boolean);

  var merged = getMergedStores();
  merged[cityKey].stores[idx] = {
    name: name, zone: zone, capacity: capacity, temp: temp, cert: cert,
    tags: tags.length ? tags : ['第三方物流'], desc: desc, features: features.length ? features : ['冷链存储']
  };
  saveMergedStores(merged);

  closeEdit();
  closeDetail();
  renderCityPanel(cityKey);
  alert('✅ 冷库信息已更新！');
}
function deleteWarehouse(cityKey, idx) {
  if (!confirm('确定要删除这个冷库吗？此操作不可撤销。')) return;
  var merged = getMergedStores();
  merged[cityKey].stores.splice(idx, 1);
  saveMergedStores(merged);
  closeDetail();
  renderCityPanel(cityKey);
  alert('🗑️ 冷库已删除');
}

// ====== Init Map Dots ======
function initMap() {
  var svg = document.getElementById('china-map');
  var frag = document.createDocumentFragment();
  for (var key in CITY_POSITIONS) {
    var p = CITY_POSITIONS[key];
    var g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','city-dot');
    g.setAttribute('data-city', key);
    g.setAttribute('onclick',"selectCity('" + key + "')");
    var circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', p.x);
    circle.setAttribute('cy', p.y);
    circle.setAttribute('r', p.r);
    circle.setAttribute('fill', p.core ? '#e65100' : '#00a8e8');
    circle.setAttribute('stroke','#fff');
    circle.setAttribute('stroke-width','2');
    g.appendChild(circle);
    var text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', p.x + p.r + 4);
    text.setAttribute('y', p.y + 4);
    text.textContent = (CITY_POSITIONS[key].label || getMergedStores()[key].name);
    g.appendChild(text);
    frag.appendChild(g);
  }
  svg.appendChild(frag);
}

// ====== Boot ======
initMap();

// Double-click masthead for admin
document.getElementById('masthead').addEventListener('dblclick', function(e) {
  if (!isAdmin) checkPassword();
  else alert('已在管理模式中');
});
// Ctrl+Shift+A for admin
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a')) {
    e.preventDefault();
    if (!isAdmin) checkPassword();
    else alert('已在管理模式中');
  }
});
</script>
