.tag-checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-checkbox-group label.tag-cb {

}
.tag-checkbox-group label.tag-cb:hover { border-color: #00a8e8; background: #f0f9ff; }
.tag-checkbox-group label.tag-cb.checked { background: #00a8e8; color: #fff; border-color: #00a8e8; }
.tag-checkbox-group label.tag-cb input { display: none; }
.search-radio-group { display: flex; gap: 12px; align-items: center; }
.search-radio-group label.sr-label {

.search-radio-group label.sr-label:hover { border-color: #00a8e8; }
.search-radio-group label.sr-label.checked { background: #fff3e0; color: #e65100; border-color: #e65100; }

.search-results { max-height: 420px; overflow-y: auto; }
.search-results .sr-card {

.warehouse-list {

.btn-del-wh { background: #fde8e8; color: #c62828; }

footer { text-align: center; padding: 24px; font-size: 12px; color: #aaa; border-top: 1px solid #e8edf2; margin-top: 40px; }

.empty-panel { display: flex; align-items: center; justify-content: center; flex: 1; color: #ccc; font-size: 14px; }

// ====== Merge custom data ======
function getMergedStores() {
  var merged = {};
  var raw = localStorage.getItem('COLDCHAIN_CUSTOM');
  var custom = raw ? JSON.parse(raw) : {};
  for (var key in COLDCHAIN_DATA) {
    var def = COLDCHAIN_DATA[key];
    var cityCustom = custom[key];
    merged[key] = {
      name: cityCustom && cityCustom.name ? cityCustom.name : def.name,
      icon: cityCustom && cityCustom.icon ? cityCustom.icon : def.icon,
      desc: cityCustom && cityCustom.desc ? cityCustom.desc : def.desc,
      stores: (cityCustom && cityCustom.stores) ? cityCustom.stores.slice() : def.stores.slice()
    };
  }
  return merged;
}
function saveMergedStores(merged) {
  var toSave = {};
  for (var key in merged) {
    toSave[key] = { stores: merged[key].stores };
  }
  localStorage.setItem('COLDCHAIN_CUSTOM', JSON.stringify(toSave));
}

function selectCity(cityKey) {
  currentCityKey = cityKey;
  var stores = getMergedStores();
  var city = stores[cityKey];
  if (!city) return;
  renderCityPanel(cityKey);

  // Highlight on map
  var dots = document.querySelectorAll('.city-dot');
  for (var j = 0; j < dots.length; j++) {
    var isSel = dots[j].getAttribute('data-city') === cityKey;
    var pos = CITY_POSITIONS[dots[j].getAttribute('data-city')];
    var isPort = pos && pos.port;

    if (isPort) {
      // Port city: <rect>
      var rect = dots[j].querySelector('rect');
      if (!rect) continue;
      rect.setAttribute('fill', isSel ? '#f59e0b' : (pos.core ? '#e65100' : '#00a8e8'));
      if (isSel) {
        rect.setAttribute('stroke-width', '4');
        rect.setAttribute('stroke', '#f59e0b');
      } else {
        rect.setAttribute('stroke-width', '2');
        rect.setAttribute('stroke', '#fff');
      }
    } else {
      // Inland city: <circle>
      var circ = dots[j].querySelector('circle');
      if (!circ) continue;
      circ.setAttribute('fill', isSel ? '#f59e0b' : (pos.core ? '#e65100' : '#00a8e8'));
      if (isSel) {
        circ.setAttribute('r', '10');
      } else {
        if (pos) circ.setAttribute('r', pos.r);
      }
    }
  }
}

// ====== Search Modal ======
var searchFilters = { tags: [], supervised: '' };

function openSearchModal() {
  // Collect all unique tags
  var allTags = {};
  var stores = getMergedStores();
  var cities = Object.keys(stores);
  for (var c = 0; c < cities.length; c++) {
    var cityStores = stores[cities[c]].stores;
    for (var s = 0; s < cityStores.length; s++) {
      var tgs = cityStores[s].tags || [];
      for (var t = 0; t < tgs.length; t++) {
        allTags[tgs[t]] = (allTags[tgs[t]] || 0) + 1;
      }
    }
  }
  var tagList = Object.keys(allTags).sort();

  var filterHtml = '<div class="search-filter-section">';
  filterHtml += '<h4>🏷️ 按标签筛选（可多选，留空 = 不限）</h4>';
  filterHtml += '<div class="tag-checkbox-group" id="tag-checkboxes">';
  for (var i = 0; i < tagList.length; i++) {
    var checked = searchFilters.tags.indexOf(tagList[i]) >= 0;
    filterHtml += '<label class="tag-cb' + (checked ? ' checked' : '') + '" data-tag="' + escAttr(tagList[i]) + '" onclick="toggleTagCb(this)">' + tagList[i] + ' <span style="opacity:0.6;font-size:10px">(' + allTags[tagList[i]] + ')</span></label>';
  }
  filterHtml += '</div></div>';

  filterHtml += '<div class="search-filter-section">';
  filterHtml += '<h4>🔐 是否金融监管仓</h4>';
  filterHtml += '<div class="search-radio-group" id="supervised-radios">';
  var opts = [
    { v: '', label: '全部' },
    { v: '1', label: '是（金融监管仓）' },
    { v: '0', label: '否（普通冷库）' }
  ];
  for (var k = 0; k < opts.length; k++) {
    var sel = searchFilters.supervised === opts[k].v;
    filterHtml += '<label class="sr-label' + (sel ? ' checked' : '') + '" data-v="' + opts[k].v + '" onclick="toggleSupervisedR(this)">' + opts[k].label + '</label>';
  }
  filterHtml += '</div></div>';

  document.getElementById('search-filters').innerHTML = filterHtml;
  document.getElementById('search-modal').classList.add('show');

  // Restore previous results if any
  if (searchFilters.tags.length > 0 || searchFilters.supervised !== '') {
    doSearch();
  } else {
    document.getElementById('search-results').innerHTML = '<div class="sr-empty">请选择筛选条件后点击「搜索」</div>';
  }
}

function toggleTagCb(el) {
  el.classList.toggle('checked');
}

function toggleSupervisedR(el) {
  var group = document.getElementById('supervised-radios');
  var labels = group.querySelectorAll('.sr-label');
  for (var i = 0; i < labels.length; i++) {
    labels[i].classList.remove('checked');
  }
  el.classList.add('checked');
}

function doSearch() {
  // Read selected tags
  var cbs = document.querySelectorAll('#tag-checkboxes .tag-cb.checked');
  var selectedTags = [];
  for (var i = 0; i < cbs.length; i++) {
    selectedTags.push(cbs[i].getAttribute('data-tag'));
  }

  // Read supervised radio
  var radios = document.querySelectorAll('#supervised-radios .sr-label.checked');
  var supervisedVal = radios.length > 0 ? radios[0].getAttribute('data-v') : '';

  // Save state
  searchFilters.tags = selectedTags;
  searchFilters.supervised = supervisedVal;

  // Collect all matching stores
  var stores = getMergedStores();
  var cities = Object.keys(stores);
  var results = [];
  for (var c = 0; c < cities.length; c++) {
    var cityKey = cities[c];
    var city = stores[cityKey];
    for (var s = 0; s < city.stores.length; s++) {
      var st = city.stores[s];
      // Tag filter
      if (selectedTags.length > 0) {
        var matchTag = false;
        for (var t = 0; t < selectedTags.length; t++) {
          if (st.tags && st.tags.indexOf(selectedTags[t]) >= 0) {
            matchTag = true;
            break;
          }
        }
        if (!matchTag) continue;
      }
      // Supervised filter
      if (supervisedVal === '1' && !st.supervised) continue;
      if (supervisedVal === '0' && st.supervised) continue;

      results.push({ cityKey: cityKey, city: city, store: st, idx: s });
    }
  }

  var listEl = document.getElementById('search-results');
  if (results.length === 0) {
    listEl.innerHTML = '<div class="sr-empty">😕 没有匹配的冷库，请调整筛选条件</div>';
    return;
  }

  var html = '<div style="font-size:11px;color:#aaa;margin-bottom:8px;">找到 ' + results.length + ' 个冷库</div>';
  for (var r = 0; r < results.length; r++) {
    var it = results[r];
    var st = it.store;
    var city = it.city;
    var cityKey = it.cityKey;
    var idx = it.idx;
    html += '<div class="sr-card" onclick="closeSearchModal();showDetail(\'' + cityKey + '\',' + idx + ')">';
    html += '<div class="sr-city"><span class="sr-city-icon">' + city.icon + '</span>' + city.name + '</div>';
    html += '<div class="sr-info">';
    html += '<div class="sr-name">' + st.name + (st.supervised ? ' <span class="badge-supervised">🔐 监管仓</span>' : '') + '</div>';
    html += '<div class="sr-meta">📍 ' + st.zone + ' · 📦 ' + st.capacity + ' · 🌡️ ' + st.temp + ' · 🏅 ' + (st.cert || '无') + '</div>';
    html += '<div class="sr-tags">' + st.tags.map(function(tg){return '<span class="tag' + (tg==='海关监管'||tg==='保税仓'?' blue':'') + '">' + tg + '</span>';}).join('') + '</div>';
    html += '</div></div>';
  }
  listEl.innerHTML = html;
}

function closeSearchModal() {
  document.getElementById('search-modal').classList.remove('show');
}

function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function saveNewWh(cityKey) {
  var name = document.getElementById('edit-name').value.trim();
  if (!name) { alert('请输入冷库名称'); return; }
  var zone = document.getElementById('edit-zone').value.trim() || '未注明';
  var capacity = document.getElementById('edit-capacity').value.trim() || '未注明';
  var temp = document.getElementById('edit-temp').value.trim() || '未注明';
  var cert = document.getElementById('edit-cert').value.trim();
  var tags = document.getElementById('edit-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
  var desc = document.getElementById('edit-desc').value.trim();
  var features = document.getElementById('edit-features').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
  var supervisedEl = document.querySelector('input[name="edit-supervised"]:checked');
  var supervised = supervisedEl && supervisedEl.value === '1';

  var merged = getMergedStores();
  merged[cityKey].stores.push({
    name: name, zone: zone, capacity: capacity, temp: temp, cert: cert,
    tags: tags.length ? tags : ['第三方物流'], desc: desc, features: features.length ? features : ['冷链存储'],
    supervised: supervised
  });
  saveMergedStores(merged);

  closeEdit();
  renderCityPanel(cityKey);
  alert('✅ 冷库已添加！');
}
function saveEditWh(cityKey, idx) {
  var name = document.getElementById('edit-name').value.trim();
  if (!name) { alert('请输入冷库名称'); return; }
  var zone = document.getElementById('edit-zone').value.trim() || '未注明';
  var capacity = document.getElementById('edit-capacity').value.trim() || '未注明';
  var temp = document.getElementById('edit-temp').value.trim() || '未注明';
  var cert = document.getElementById('edit-cert').value.trim();
  var tags = document.getElementById('edit-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
  var desc = document.getElementById('edit-desc').value.trim();
  var features = document.getElementById('edit-features').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
  var supervisedEl = document.querySelector('input[name="edit-supervised"]:checked');
  var supervised = supervisedEl && supervisedEl.value === '1';

  var merged = getMergedStores();
  merged[cityKey].stores[idx] = {
    name: name, zone: zone, capacity: capacity, temp: temp, cert: cert,
    tags: tags.length ? tags : ['第三方物流'], desc: desc, features: features.length ? features : ['冷链存储'],
    supervised: supervised
  };
  saveMergedStores(merged);

  closeEdit();
  closeDetail();
  renderCityPanel(cityKey);
  alert('✅ 冷库信息已更新！');
}
function deleteWarehouse(cityKey, idx) {
  if (!confirm('确定要删除这个冷库吗？此操作不可撤销。')) return;
  var merged = getMergedStores();
  merged[cityKey].stores.splice(idx, 1);
  saveMergedStores(merged);
  closeDetail();
  renderCityPanel(cityKey);
  alert('🗑️ 冷库已删除');
}

// ====== Init Map Dots ======
function initMap() {
  var svg = document.getElementById('china-map');
  var frag = document.createDocumentFragment();
  for (var key in CITY_POSITIONS) {
    var p = CITY_POSITIONS[key];
    var g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','city-dot');
    g.setAttribute('data-city', key);
    g.setAttribute('onclick',"selectCity('" + key + "')");

    if (p.port) {
      // Port city: use <rect> (square)
      var rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      var size = (p.r || 5) * 2;
      rect.setAttribute('x', p.x - p.r);
      rect.setAttribute('y', p.y - p.r);
      rect.setAttribute('width', size);
      rect.setAttribute('height', size);
      rect.setAttribute('rx', 2);
      rect.setAttribute('ry', 2);
      rect.setAttribute('fill', p.core ? '#e65100' : '#00a8e8');
      rect.setAttribute('stroke','#fff');
      rect.setAttribute('stroke-width','2');
      g.appendChild(rect);
    } else {
      // Inland city: use <circle>
      var circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', p.x);
      circle.setAttribute('cy', p.y);
      circle.setAttribute('r', p.r);
      circle.setAttribute('fill', p.core ? '#e65100' : '#00a8e8');
      circle.setAttribute('stroke','#fff');
      circle.setAttribute('stroke-width','2');
      g.appendChild(circle);
    }

    var text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', p.x + (p.labelDx || (p.port ? p.r + 6 : p.r + 4)));
    text.setAttribute('y', p.y + (p.labelDy || 4));
    text.textContent = (p.label || getMergedStores()[key].name);
    g.appendChild(text);
    frag.appendChild(g);
  }
  svg.appendChild(frag);
}

// ====== Boot ======
initMap();
