<title>冷链服务 — 以鲜国际</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", -apple-system, sans-serif;
  color: #1a1a2e; line-height: 1.7; background: #f5f7fb; min-height: 100vh;
}
a { text-decoration: none; color: inherit; }

/* Nav */
nav {
  background: rgba(255,255,255,0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid #e8edf2; position: sticky; top: 0; z-index: 100; padding: 0 24px;
}
.nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 52px; }
.nav-logo { font-size: 18px; font-weight: 800; color: #00a8e8; margin-right: 32px; }
.nav-links { display: flex; gap: 20px; align-items: center; }
.nav-links a { font-size: 13px; font-weight: 500; color: #555; transition: color 0.2s; }
.nav-links a:hover { color: #00a8e8; }
.nav-tools { background: #f59e0b; color: #fff !important; padding: 5px 14px; border-radius: 20px; font-size: 12px; }
.nav-tools:hover { background: #e08f0b; color: #fff !important; }

/* Admin bar */
.admin-bar {
  display: none; background: #1a3a5c; color: #fff; padding: 8px 24px;
  font-size: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.admin-bar.show { display: flex; }
.admin-bar .admin-lock { cursor: pointer; padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: none; color: #fff; font-size: 11px; font-family: inherit; }
.admin-bar .admin-hint { opacity: 0.7; font-size: 11px; }

/* Masthead */
.masthead {
  background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #00a8e8 100%);
  color: #fff; text-align: center; padding: 40px 24px 36px;
}
.masthead h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
.masthead p { font-size: 14px; opacity: 0.85; max-width: 600px; margin: 0 auto; }

/* Main layout */
.main-wrap {
  max-width: 1300px; margin: 0 auto; padding: 24px; display: flex; gap: 24px; min-height: 600px;
}

/* Map section */
.map-section {
  flex: 1; min-width: 0; background: #fff; border-radius: 16px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06); padding: 24px; position: relative;
}
.map-section h2 {
  font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #1a3a5c;
  display: flex; align-items: center; gap: 8px;
}
.map-svg { width: 100%; height: auto; }
.map-bg { fill: #e8f4f8; stroke: #b8d8e8; stroke-width: 1.8; stroke-linejoin: round; }
.city-dot { cursor: pointer; transition: all 0.2s; }
.city-dot:hover { filter: brightness(1.15); }
.city-dot circle { transition: r 0.2s, fill 0.2s; }
.city-dot:hover circle { r: 10; }
.city-dot text { font-size: 10px; font-weight: 600; fill: #1a3a5c; pointer-events: none; }
.city-dot .city-pin { fill: #fff; }
.map-tip { text-align: center; color: #aaa; font-size: 12px; margin-top: 8px; }

/* Side panel */
.side-panel {
  width: 380px; flex-shrink: 0; background: #fff; border-radius: 16px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06); padding: 24px;
  display: flex; flex-direction: column; gap: 16px;
  max-height: 660px; overflow: hidden;
}
.panel-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #ccc; text-align: center; gap: 12px;
}
.panel-empty .icon { font-size: 48px; }
.panel-city-header {
  display: flex; align-items: center; gap: 12px; padding-bottom: 12px;
  border-bottom: 1px solid #e8edf2; justify-content: space-between;
}
.panel-city-header .city-left { display: flex; align-items: center; gap: 12px; }
.panel-city-header .city-icon { font-size: 28px; }
.panel-city-header h3 { font-size: 18px; font-weight: 700; color: #1a3a5c; }
.panel-city-header .count { font-size: 12px; color: #888; }
.panel-city-header .add-btn {
  display: none; background: #00a8e8; color: #fff; border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 11px; cursor: pointer; font-family: inherit; font-weight: 600;
}
.panel-city-header .add-btn.visible { display: inline-block; }
.warehouse-list {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 4px;
}
.wh-card {
  background: #f8fafc; border: 1.5px solid #e8edf2; border-radius: 12px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s; position: relative;
}
.wh-card:hover { border-color: #00a8e8; background: #f0f9ff; }
.wh-card .wh-name { font-size: 14px; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; }
.wh-card .wh-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: #888; }
.wh-card .wh-meta span { display: flex; align-items: center; gap: 4px; }
.wh-card .wh-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.wh-card .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
.wh-card .tag.blue { background: #e3f2fd; color: #1565c0; }
.wh-card .edit-btn {
  display: none; position: absolute; top: 10px; right: 10px;
  background: #e8edf2; border: none; border-radius: 6px; padding: 3px 8px;
  font-size: 11px; cursor: pointer; color: #555; font-family: inherit;
}
.wh-card .edit-btn:hover { background: #00a8e8; color: #fff; }
.wh-card .edit-btn.visible { display: block; }

/* Detail modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff; border-radius: 20px; max-width: 620px; width: 92%;
  max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.modal-body { padding: 28px; }
.modal-close {
  float: right; background: none; border: none; font-size: 22px;
  cursor: pointer; color: #aaa; padding: 4px; line-height: 1;
}
.modal-close:hover { color: #333; }
.modal-header { margin-bottom: 20px; }
.modal-header h2 { font-size: 20px; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; }
.modal-header .city-badge {
  display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px;
  background: #e3f2fd; color: #1565c0; font-weight: 600;
}
.modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.modal-info-item { background: #f8fafc; border-radius: 10px; padding: 12px; }
.modal-info-item .label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-info-item .value { font-size: 14px; font-weight: 600; color: #1a3a5c; margin-top: 2px; }
.modal-desc { font-size: 13px; color: #555; line-height: 1.8; }
.modal-features { margin-top: 16px; }
.modal-features h4 { font-size: 13px; font-weight: 700; color: #1a3a5c; margin-bottom: 8px; }
.modal-features ul { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; }
.modal-features li { font-size: 11px; padding: 4px 10px; border-radius: 8px; background: #e8f5e9; color: #2e7d32; }
.modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid #e8edf2; padding-top: 16px; }
.modal-actions.admin-only { display: none; }
.modal-actions.admin-only.visible { display: flex; }
.modal-actions button {
  padding: 8px 16px; border-radius: 8px; border: none; font-size: 12px;
  font-family: inherit; cursor: pointer; font-weight: 600;

.btn-edit-wh { background: #e3f2fd; color: #1565c0; }
.btn-edit-wh:hover { background: #bbdefb; }
.btn-del-wh { background: #fde8e8; color: #c62828; }
.btn-del-wh:hover { background: #ffcdd2; }

/* Edit / Add Modal */
.edit-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 300; align-items: center; justify-content: center;

.edit-overlay.show { display: flex; }
.edit-box {

.edit-body { padding: 28px; }

.edit-body .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.edit-body .form-full { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.edit-body label { font-size: 12px; color: #888; font-weight: 600; }
.edit-body input, .edit-body textarea, .edit-body select {
  padding: 10px 14px; border: 1.5px solid #e0e5ec; border-radius: 10px;
  font-size: 13px; font-family: inherit; background: #fafbfc;

.edit-body input:focus, .edit-body textarea:focus { outline: none; border-color: #00a8e8; }
.edit-body textarea { min-height: 80px; resize: vertical; }
.edit-body .edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.edit-body .edit-actions button {
  padding: 10px 20px; border-radius: 10px; border: none; font-size: 13px;
  font-family: inherit; cursor: pointer; font-weight: 600;
}
.btn-save { background: #00a8e8; color: #fff; }
.btn-save:hover { background: #0284c7; }
.btn-cancel { background: #e8edf2; color: #555; }
.btn-cancel:hover { background: #d0d5dc; }
.tags-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 12px;
  background: #e3f2fd; color: #1565c0; font-size: 11px; font-weight: 600;
}
.tag-chip .remove-tag { cursor: pointer; font-size: 14px; line-height: 1; }
.tag-chip .remove-tag:hover { color: #c62828; }

/* Footer */
footer {
  text-align: center; padding: 24px; font-size: 12px; color: #aaa;
  border-top: 1px solid #e8edf2; margin-top: 40px;
}

/* Responsive */
@media (max-width: 900px) {
  .main-wrap { flex-direction: column; }
  .side-panel { width: 100%; max-height: 400px; }
}
</style>

}
function saveCustomData(custom) {
  localStorage.setItem('COLDCHAIN_CUSTOM', JSON.stringify(custom));
}
function getMergedStores() {
  var custom = loadCustomData();
  var merged = {};
  for (var key in DEFAULT_STORES) {
    var def = DEFAULT_STORES[key];
    var cityCustom = custom[key] || {};
    merged[key] = {
      name: cityCustom.name || def.name,
      icon: cityCustom.icon || def.icon,
      desc: cityCustom.desc || def.desc,
      stores: (cityCustom.stores || def.stores).slice()
    };
  }
  return merged;
}

// Generate unique ID
function genId() { return 'wh_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

// ====== Admin ======
function checkPassword() {
  var pw = prompt('请输入管理密码：');
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('admin-bar').classList.add('show');
    if (currentCityKey) renderCityPanel(currentCityKey);
    alert('✅ 管理模式已开启，现在可以编辑和新增冷库信息。');
  } else if (pw !== null) {
    alert('❌ 密码错误');
  }
}
function logoutAdmin() {
  isAdmin = false;
  document.getElementById('admin-bar').classList.remove('show');
  if (currentCityKey) renderCityPanel(currentCityKey);
}

// ====== Select City ======
function selectCity(cityKey) {
  currentCityKey = cityKey;
  var stores = getMergedStores();
  var city = stores[cityKey];
  if (!city) return;
  renderCityPanel(cityKey);

  // Highlight on map
  var dots = document.querySelectorAll('.city-dot');
  for (var j = 0; j < dots.length; j++) {
    var isSel = dots[j].getAttribute('data-city') === cityKey;
    dots[j].querySelector('circle').setAttribute('fill', isSel ? '#f59e0b' : '#00a8e8');
    dots[j].querySelector('circle').setAttribute('r', isSel ? '10' : (dots[j].querySelector('circle').getAttribute('r') === '8' ? '7' : dots[j].querySelector('circle').getAttribute('r') === '7' ? '6' : '5'));
  }
}

function renderCityPanel(cityKey) {
  var stores = getMergedStores();
  var city = stores[cityKey];
  if (!city) return;

  var header = document.getElementById('panel-header');
  header.innerHTML = '<div class="city-left">' +
    '<div class="city-icon">' + city.icon + '</div>' +
    '<div><h3>' + city.name + '</h3><div class="count">' + city.desc + ' &middot; ' + city.stores.length + ' 座冷库</div></div>' +
    '</div>' +
    '<button class="add-btn' + (isAdmin ? ' visible' : '') + '" onclick="openAddModal(\'' + cityKey + '\')">+ 新增冷库</button>';

  var list = document.getElementById('warehouse-list');
  list.innerHTML = '';
  for (var i = 0; i < city.stores.length; i++) {
    var s = city.stores[i];
    list.innerHTML += '<div class="wh-card" onclick="showDetail(\'' + cityKey + '\',' + i + ')">' +
      '<button class="edit-btn' + (isAdmin ? ' visible' : '') + '" onclick="event.stopPropagation();openEditModal(\'' + cityKey + '\',' + i + ')">&#x270F;&#xFE0F; 编辑</button>' +
      '<div class="wh-name">' + s.name + '</div>' +
      '<div class="wh-meta">' +
        '<span>&#x1F4CD; ' + s.area + '</span>' +
        '<span>&#x1F4E6; ' + s.capacity + '</span>' +
        '<span>&#x1F321;&#xFE0F; ' + s.temp + '</span>' +
      '</div>' +
      '<div class="wh-tags">' + s.tags.map(function(t){ return '<span class="tag' + (t.indexOf('海关')>=0||t.indexOf('保税')>=0?' blue':'') + '">' + t + '</span>'; }).join('') + '</div>' +
    '</div>';
  }

  document.getElementById('panel-empty').style.display = 'none';
  document.getElementById('panel-content').style.display = 'flex';
}

// ====== Show Detail ======
function showDetail(cityKey, index) {
  var stores = getMergedStores();
  var city = stores[cityKey];
  var s = city.stores[index];

  var modal = document.getElementById('modal-body');
  modal.innerHTML = '<button class="modal-close" onclick="closeModal()">&times;</button>' +
    '<div class="modal-header">' +
      '<h2>' + s.name + '</h2>' +
      '<span class="city-badge">' + city.icon + ' ' + city.name + '</span>' +
    '</div>' +
    '<div class="modal-info-grid">' +
      '<div class="modal-info-item"><div class="label">地址</div><div class="value">' + s.area + '</div></div>' +
      '<div class="modal-info-item"><div class="label">库容规模</div><div class="value">' + s.capacity + '</div></div>' +
      '<div class="modal-info-item"><div class="label">温区范围</div><div class="value">' + s.temp + '</div></div>' +
      '<div class="modal-info-item"><div class="label">资质认证</div><div class="value">' + s.cert + '</div></div>' +
    '</div>' +
    '<div class="modal-desc"><strong>简介</strong><br>' + s.desc + '</div>' +
    '<div class="modal-features">' +
      '<h4>核心能力</h4>' +
      '<ul>' + s.features.map(function(f){ return '<li>' + f + '</li>'; }).join('') + '</ul>' +
    '</div>' +
    '<div class="modal-actions admin-only' + (isAdmin ? ' visible' : '') + '">' +
      '<button class="btn-edit-wh" onclick="closeModal();openEditModal(\'' + cityKey + '\',' + index + ')">&#x270F;&#xFE0F; 编辑</button>' +
      '<button class="btn-del-wh" onclick="deleteWarehouse(\'' + cityKey + '\',' + index + ')">&#x1F5D1;&#xFE0F; 删除</button>' +
    '</div>';

  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ====== Edit Warehouse ======
function openEditModal(cityKey, index) {
  if (!isAdmin) { checkPassword(); if (!isAdmin) return; }
  var stores = getMergedStores();
  var s = stores[cityKey].stores[index];

  buildEditForm('编辑冷库', cityKey, index, s);
  document.getElementById('edit-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

// ====== Add Warehouse ======
function openAddModal(cityKey) {
  if (!isAdmin) { checkPassword(); if (!isAdmin) return; }
  buildEditForm('新增冷库', cityKey, null, { name:'', area:'', capacity:'', temp:'', cert:'', tags:[], desc:'', features:[] });
  document.getElementById('edit-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function buildEditForm(title, cityKey, index, data) {
  var tagsHtml = data.tags.map(function(t){ return '<span class="tag-chip">' + t + '<span class="remove-tag" onclick="this.parentElement.remove()">×</span></span>'; }).join('');
  var featuresHtml = data.features.join('\n');

  document.getElementById('edit-body').innerHTML =
    '<button class="modal-close" onclick="closeEditModal()">&times;</button>' +
    '<h3>' + title + '</h3>' +
    '<div class="form-row">' +
      '<div class="form-full"><label>冷库名称 *</label><input id="ef-name" value="' + esc(data.name) + '" placeholder="e.g. 上海临港冷链物流园"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div><label>所在区域 *</label><input id="ef-area" value="' + esc(data.area) + '" placeholder="e.g. 浦东新区临港"></div>' +
      '<div><label>库容规模</label><input id="ef-capacity" value="' + esc(data.capacity) + '" placeholder="e.g. 20万吨"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div><label>温区范围</label><input id="ef-temp" value="' + esc(data.temp) + '" placeholder="e.g. -25°C ~ +5°C"></div>' +
      '<div><label>资质认证</label><input id="ef-cert" value="' + esc(data.cert) + '" placeholder="e.g. 海关监管库"></div>' +
    '</div>' +
    '<div class="form-full"><label>标签（逗号分隔）</label><div style="display:flex;gap:6px;align-items:center"><input id="ef-tags" value="' + esc(data.tags.join(',')) + '" placeholder="海关监管,保税仓,肉类专库" style="flex:1"><span style="font-size:11px;color:#aaa">逗号分隔</span></div></div>' +
    '<div class="form-full"><label>简介</label><textarea id="ef-desc" placeholder="冷库详细介绍...">' + esc(data.desc) + '</textarea></div>' +
    '<div class="form-full"><label>核心能力（每行一个）</label><textarea id="ef-features" placeholder="自动化立体库&#10;RFID溯源&#10;海关驻库">' + featuresHtml + '</textarea></div>' +
    '<div class="edit-actions">' +
      '<button class="btn-cancel" onclick="closeEditModal()">取消</button>' +
      (index !== null ? '<button class="btn-del-wh" style="margin-right:auto" onclick="deleteWarehouse(\'' + cityKey + '\',' + index + ')">&#x1F5D1;&#xFE0F; 删除</button>' : '') +
      '<button class="btn-save" onclick="saveWarehouse(\'' + cityKey + '\',' + (index !== null ? index : -1) + ')">&#x1F4BE; 保存</button>' +
    '</div>';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function saveWarehouse(cityKey, index) {
  var name = document.getElementById('ef-name').value.trim();
  if (!name) { alert('请输入冷库名称'); return; }
  var area = document.getElementById('ef-area').value.trim();
  var capacity = document.getElementById('ef-capacity').value.trim();
  var temp = document.getElementById('ef-temp').value.trim();
  var cert = document.getElementById('ef-cert').value.trim();
  var tags = document.getElementById('ef-tags').value.split(',').map(function(t){ return t.trim(); }).filter(function(t){ return t; });
  var desc = document.getElementById('ef-desc').value.trim();
  var features = document.getElementById('ef-features').value.split('\n').map(function(f){ return f.trim(); }).filter(function(f){ return f; });

  var custom = loadCustomData();
  if (!custom[cityKey]) {
    custom[cityKey] = { stores: JSON.parse(JSON.stringify(DEFAULT_STORES[cityKey].stores)) };
  }
  if (!custom[cityKey].stores) {
    custom[cityKey].stores = JSON.parse(JSON.stringify(DEFAULT_STORES[cityKey].stores));
  }

  var storeObj = { name:name, area:area, capacity:capacity, temp:temp, cert:cert, tags:tags, desc:desc, features:features };

  if (index >= 0) {
    // Edit existing
    storeObj.id = custom[cityKey].stores[index].id || genId();
    custom[cityKey].stores[index] = storeObj;
  } else {
    // Add new
    storeObj.id = genId();
    custom[cityKey].stores.push(storeObj);
  }

  saveCustomData(custom);
  closeEditModal();
  renderCityPanel(cityKey);
}

function deleteWarehouse(cityKey, index) {
  if (!confirm('确定要删除这个冷库吗？此操作不可恢复。')) return;
  var custom = loadCustomData();
  if (!custom[cityKey]) {
    custom[cityKey] = { stores: JSON.parse(JSON.stringify(DEFAULT_STORES[cityKey].stores)) };
  }
  if (!custom[cityKey].stores) {
    custom[cityKey].stores = JSON.parse(JSON.stringify(DEFAULT_STORES[cityKey].stores));
  }
  custom[cityKey].stores.splice(index, 1);
  saveCustomData(custom);
  closeModal();
  closeEditModal();
  renderCityPanel(cityKey);
}

function closeEditModal(e) {
  if (e && e.target !== document.getElementById('edit-overlay')) return;
  document.getElementById('edit-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ====== Init ======
// Click masthead for admin
document.querySelector('.masthead').style.cursor = 'default';
document.querySelector('.masthead').addEventListener('dblclick', function(e) {
  if (!isAdmin) checkPassword();
});

// Keyboard shortcut: Ctrl+Shift+A for admin
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'A') {
    if (!isAdmin) checkPassword();
  }
});
</script>
</body>
