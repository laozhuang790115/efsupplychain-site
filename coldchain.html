<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {

a { text-decoration: none; color: inherit; }

/* Nav */
nav {

.nav-inner {
  max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 52px;
}
.nav-logo { font-size: 18px; font-weight: 800; color: #00a8e8; margin-right: 32px; }
.nav-links { display: flex; gap: 20px; align-items: center; }
.nav-links a { font-size: 13px; font-weight: 500; color: #555; transition: color 0.2s; }
.nav-links a:hover { color: #00a8e8; }
.nav-tools { background: #f59e0b; color: #fff !important; padding: 5px 14px; border-radius: 20px; font-size: 12px; }
.nav-tools:hover { background: #e08f0b; color: #fff !important; }

/* Masthead */
.masthead {
  background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #00a8e8 100%);
  color: #fff; text-align: center; padding: 40px 24px 36px;
}
.masthead h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
.masthead p { font-size: 14px; opacity: 0.85; max-width: 600px; margin: 0 auto; }

/* Main layout */
.main-wrap {
  max-width: 1300px; margin: 0 auto; padding: 24px; display: flex; gap: 24px;
  min-height: 600px;
}

/* Map section */
.map-section {
  flex: 1; min-width: 0; background: #fff; border-radius: 16px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06); padding: 24px; position: relative;
}
.map-section h2 {
  font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #1a3a5c;
  display: flex; align-items: center; gap: 8px;
}
.map-svg { width: 100%; height: auto; }
.city-dot { cursor: pointer; transition: all 0.2s; }
.city-dot:hover { filter: brightness(1.2); }
.city-dot circle { transition: r 0.2s; }
.city-dot:hover circle { r: 10; }
.city-label { font-size: 10px; font-weight: 600; fill: #1a3a5c; pointer-events: none; }
.map-tip {
  text-align: center; color: #aaa; font-size: 12px; margin-top: 8px;
}

/* Side panel */
.side-panel {
  width: 380px; flex-shrink: 0; background: #fff; border-radius: 16px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06); padding: 24px;
  display: flex; flex-direction: column; gap: 16px;
  max-height: 640px; overflow: hidden;
}
.panel-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #ccc; text-align: center; gap: 12px;
}
.panel-empty .icon { font-size: 48px; }
.panel-city-header {
  display: flex; align-items: center; gap: 12px; padding-bottom: 16px;
  border-bottom: 1px solid #e8edf2;
}
.panel-city-header .city-icon { font-size: 32px; }
.panel-city-header h3 { font-size: 18px; font-weight: 700; color: #1a3a5c; }
.panel-city-header .count { font-size: 12px; color: #888; }
.warehouse-list {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
  padding-right: 4px;
}
.wh-card {
  background: #f8fafc; border: 1.5px solid #e8edf2; border-radius: 12px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s;
}
.wh-card:hover { border-color: #00a8e8; background: #f0f9ff; }
.wh-card .wh-name { font-size: 14px; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; }
.wh-card .wh-meta {
  display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: #888;
}
.wh-card .wh-meta span { display: flex; align-items: center; gap: 4px; }
.wh-card .wh-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.wh-card .tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: #e8f5e9; color: #2e7d32; font-weight: 600;
}
.wh-card .tag.blue { background: #e3f2fd; color: #1565c0; }

/* Detail modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff; border-radius: 20px; max-width: 600px; width: 90%;
  max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.modal-body { padding: 28px; }
.modal-close {
  float: right; background: none; border: none; font-size: 22px;
  cursor: pointer; color: #aaa; padding: 4px; line-height: 1;
}
.modal-close:hover { color: #333; }
.modal-header { margin-bottom: 20px; }
.modal-header h2 { font-size: 20px; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; }
.modal-header .city-badge {
  display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px;
  background: #e3f2fd; color: #1565c0; font-weight: 600;
}
.modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.modal-info-item { background: #f8fafc; border-radius: 10px; padding: 12px; }
.modal-info-item .label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-info-item .value { font-size: 14px; font-weight: 600; color: #1a3a5c; margin-top: 2px; }
.modal-desc { font-size: 13px; color: #555; line-height: 1.8; }
.modal-features { margin-top: 16px; }
.modal-features h4 { font-size: 13px; font-weight: 700; color: #1a3a5c; margin-bottom: 8px; }
.modal-features ul { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; }
.modal-features li {
  font-size: 11px; padding: 4px 10px; border-radius: 8px;
  background: #e8f5e9; color: #2e7d32;
}

/* Footer */
footer {
  text-align: center; padding: 24px; font-size: 12px; color: #aaa;
  border-top: 1px solid #e8edf2; margin-top: 40px;
}

/* Responsive */
@media (max-width: 900px) {
  .main-wrap { flex-direction: column; }
  .side-panel { width: 100%; max-height: 400px; }
}
</style>

// ====== Select City ======
function selectCity(cityKey) {
  var city = coldStores[cityKey];
  if (!city) return;
  
  var header = document.getElementById('panel-header');
  header.innerHTML = '<div class="city-icon">' + city.icon + '</div>' +
    '<div><h3>' + city.name + '</h3><div class="count">' + city.desc + ' &middot; ' + city.stores.length + ' 座冷库</div></div>';
  
  var list = document.getElementById('warehouse-list');
  list.innerHTML = '';
  for (var i = 0; i < city.stores.length; i++) {
    var s = city.stores[i];
    list.innerHTML += '<div class="wh-card" onclick="showDetail(\'' + cityKey + '\',' + i + ')">' +
      '<div class="wh-name">' + s.name + '</div>' +
      '<div class="wh-meta">' +
        '<span>&#x1F4CD; ' + s.area + '</span>' +
        '<span>&#x1F4E6; ' + s.capacity + '</span>' +
        '<span>&#x1F321;&#xFE0F; ' + s.temp + '</span>' +
      '</div>' +
      '<div class="wh-tags">' + s.tags.map(function(t){ return '<span class="tag' + (t.indexOf('海关')>=0||t.indexOf('保税')>=0?' blue':'') + '">' + t + '</span>'; }).join('') + '</div>' +
    '</div>';
  }
  
  document.getElementById('panel-empty').style.display = 'none';
  document.getElementById('panel-content').style.display = 'flex';
  
  // Highlight on map
  var dots = document.querySelectorAll('.city-dot');
  for (var j = 0; j < dots.length; j++) {
    dots[j].querySelector('circle').setAttribute('fill', dots[j].getAttribute('data-city') === cityKey ? '#f59e0b' : '#00a8e8');
    dots[j].querySelector('circle').setAttribute('r', dots[j].getAttribute('data-city') === cityKey ? '10' : '7');
  }
}

// ====== Show Detail ======
function showDetail(cityKey, index) {
  var city = coldStores[cityKey];
  var s = city.stores[index];
  
  var modal = document.getElementById('modal-body');
  modal.innerHTML = '<button class="modal-close" onclick="closeModal()">&times;</button>' +
    '<div class="modal-header">' +
      '<h2>' + s.name + '</h2>' +
      '<span class="city-badge">' + city.icon + ' ' + city.name + '</span>' +
    '</div>' +
    '<div class="modal-info-grid">' +
      '<div class="modal-info-item"><div class="label">地址</div><div class="value">' + s.area + '</div></div>' +
      '<div class="modal-info-item"><div class="label">库容规模</div><div class="value">' + s.capacity + '</div></div>' +
      '<div class="modal-info-item"><div class="label">温区范围</div><div class="value">' + s.temp + '</div></div>' +
      '<div class="modal-info-item"><div class="label">资质认证</div><div class="value">' + s.cert + '</div></div>' +
    '</div>' +
    '<div class="modal-desc"><strong>简介</strong><br>' + s.desc + '</div>' +
    '<div class="modal-features">' +
      '<h4>核心能力</h4>' +
      '<ul>' + s.features.map(function(f){ return '<li>' + f + '</li>'; }).join('') + '</ul>' +
    '</div>';
  
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}
